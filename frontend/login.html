<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login for existing user</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <form>
        <table>
            <h1>LOGIN FOR EXISTING USERS</h1>

            <tr>
                <td>User Name: <input type="text" id="username" name="username" placeholder="Enter Username" required>
                </td>
            </tr>
            <tr>
                <td>Password: <input type="text" id="password" name="password" placeholder="Enter Password" required>
                </td>
            </tr>
            <tr>
                <td>Email: <input type="email" id="Email:" name="Email:" placeholder="Enter Email ID" required></td>
            </tr>
        </table>

        <h4>Not a user ? Then register yourself first according to <a href="frontend/donor_registration">Food Donor</a>
            and <a href="frontend/ngo_registration">Food Reciver</a> </h4>
        <button>Submit</button>
    </form>


</body>

</html>
