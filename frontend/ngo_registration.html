<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Receiver</title>
</head>

<body>
    <form>
        <table>
            <h1>LOGIN AS RECEIVER</h1>

            <tr>
                <td>Receiver ID: <input type="text" id="userId" name="userId" placeholder="Enter Receiver ID" required>
                </td>
            </tr>
            <tr>
                <td>Organization Name: <input type="text" id="placeName" name="placeName"
                        placeholder="Enter Name of Organization" required>
                </td>
            </tr>
            <tr>
                <td>Organization Type: <input type="text" id="placeType" name="placeType"
                        placeholder="Enter Type of Organization" required>
                </td>
            </tr>
            <tr>
                <td>Representative Name: <input type="text" id="RepresentativeName" name="RepresentativeName"
                        placeholder="Enter Name of Representative" required>
                </td>
            </tr>
            <tr>
                <td>Email ID: <input type="email" id="Email" name="Email" placeholder="Enter Email ID" required>
                </td>
            </tr>
            <tr>
                <td>Phone number: <input type="text" id="phone no" name="phone no" placeholder="Enter Phone number"
                        required>
                </td>
            </tr>
            <tr>
                <td>Address: <input type="textarea" id="address" name="address" placeholder="Enter your address"
                        required>
                </td>
            </tr>
            <tr>
                <td>City: <input type="text" id="city" name="city" placeholder="Enter your city" required>
                </td>
            </tr>
            <tr>
                <td>Password: <input type="text" id="password" name="password" placeholder="Enter Password" required>
                </td>
            </tr>
            <tr>
                <td>Confirm Password: <input type="text" id="confirm password" name="confirm password"
                        placeholder="Enter Confirm Password" required>
                </td>
            </tr>
            <tr>
                <td>Location: <input type="location" id="location" name="location" required></td>
            </tr>
        </table>
    </form>
</body>

</html>
